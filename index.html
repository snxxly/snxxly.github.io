
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SunProject - Roblox Place Development Group">
    <title>SunProject - Roblox Development Group</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="logo.png" alt="SunProject Logo" id="logo">
        <h1>Welcome to SunProject</h1>
        <nav>
            <ul>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#team">Team</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#donate">Donate</a></li>
            </ul>
        </nav>
    </header>

    <section id="projects">
        <h2>Our Projects</h2>
        <div class="project-list">
            <!-- Add project details here -->
        </div>
    </section>

    <section id="team">
        <h2>Meet the Team</h2>
        <div class="team-list">
            <!-- Add team member profiles here -->
        </div>
    </section>

    <section id="blog">
        <h2>Blog</h2>
        <div class="blog-posts">
            <!-- Add blog posts here -->
        </div>
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form action="#" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Send</button>
        </form>
    </section>

    <section id="donate">
        <h2>Support Us</h2>
        <p>If you like what we do, consider supporting us!</p>
        <button onclick="window.location.href='https://www.paypal.com'">Donate via PayPal</button>
    </section>

    <footer>
        <p>&copy; 2024 SunProject. All Rights Reserved.</p>
        <p>Follow us on: <a href="#">Instagram</a>, <a href="#">Discord</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
